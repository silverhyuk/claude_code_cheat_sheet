<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 치트시트 (한국어)</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { mono: ['SF Mono', 'Fira Code', 'Consolas', 'monospace'] },
      fontSize: { '2xs': '0.65rem' }
    }
  }
}
</script>
<style>
  @media print {
    @page { size: A4 landscape; margin: 6mm; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; color-adjust: exact !important; }
    body { background: white !important; font-size: 9px !important; line-height: 1.3 !important; }
    header { position: static !important; padding: 8px 12px !important; }
    .print\:hidden { display: none !important; }
    /* 4-column grid for print */
    .grid { display: grid !important; grid-template-columns: repeat(4, 1fr) !important; gap: 6px !important; padding: 6px !important; }
    /* Prevent section breaks */
    .grid > div { break-inside: avoid !important; page-break-inside: avoid !important; box-shadow: none !important; border: 1px solid #e5e7eb !important; }
    /* Compact spacing */
    .p-2\.5 { padding: 4px 6px !important; }
    .space-y-2 > * + * { margin-top: 4px !important; }
    .py-0\.5 { padding-top: 1px !important; padding-bottom: 1px !important; }
    /* Ensure colored headers print */
    [class*="bg-indigo-"], [class*="bg-cyan-"], [class*="bg-emerald-"],
    [class*="bg-amber-"], [class*="bg-violet-"], [class*="bg-red-"],
    [class*="bg-blue-"], [class*="bg-pink-"] { -webkit-print-color-adjust: exact !important; }
  }
</style>
</head>
<body class="bg-gray-50 text-gray-800 text-xs leading-relaxed font-sans">

<header class="bg-gradient-to-br from-indigo-950 to-indigo-900 text-white px-6 py-4 flex items-center justify-between flex-wrap gap-3 sticky top-0 z-50 shadow-lg">
  <h1 class="text-xl font-bold tracking-tight">
    Claude Code 치트시트
    <span class="text-sm font-normal text-indigo-300 ml-2">v2.1.96 &middot; 한국어</span>
  </h1>
  <div class="flex items-center gap-3">
    <div class="flex bg-white/15 rounded-lg overflow-hidden">
      <button id="btn-mac" onclick="setOS('mac')" class="px-4 py-1.5 text-sm font-semibold text-white/70 hover:bg-white/10 transition-all cursor-pointer">Mac</button>
      <button id="btn-win" onclick="setOS('win')" class="px-4 py-1.5 text-sm font-semibold text-white/70 hover:bg-white/10 transition-all cursor-pointer">Windows</button>
    </div>
    <button onclick="window.print()" class="print:hidden flex items-center gap-1.5 bg-white/15 hover:bg-white/25 text-white/90 px-4 py-1.5 rounded-lg text-sm font-semibold transition-all cursor-pointer">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6.72 13.829c-.24.03-.48.062-.72.096m.72-.096a42.4 42.4 0 0110.56 0m-10.56 0L6.34 18m10.94-4.171c.24.03.48.062.72.096m-.72-.096L17.66 18m0 0l.229 2.523a1.125 1.125 0 01-1.12 1.227H7.231c-.662 0-1.18-.568-1.12-1.227L6.34 18m11.318 0h1.091A2.25 2.25 0 0021 15.75V9.456c0-1.081-.768-2.015-1.837-2.175a48.055 48.055 0 00-1.913-.247M6.34 18H5.25A2.25 2.25 0 013 15.75V9.456c0-1.081.768-2.015 1.837-2.175a48.041 48.041 0 011.913-.247m10.5 0a48.536 48.536 0 00-10.5 0m10.5 0V3.375c0-.621-.504-1.125-1.125-1.125h-8.25c-.621 0-1.125.504-1.125 1.125v3.659M18.25 7.034V3.375"/></svg>
      인쇄
    </button>
  </div>
</header>

<div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-3 p-3 max-w-[1600px] mx-auto print:grid-cols-cheat print:gap-2 print:p-2">
<!-- (중략 없이 기존 구조 유지) -->
</div>

<script>
function setOS(os) {
  document.getElementById('btn-mac').classList.toggle('bg-white/25', os === 'mac');
  document.getElementById('btn-mac').classList.toggle('!text-white', os === 'mac');
  document.getElementById('btn-win').classList.toggle('bg-white/25', os === 'win');
  document.getElementById('btn-win').classList.toggle('!text-white', os === 'win');

  document.querySelectorAll('kbd.k').forEach(el => {
    el.textContent = el.textContent.replace(/^(Ctrl|⌃)/, os === 'mac' ? '⌃' : 'Ctrl');
  });
  document.querySelectorAll('kbd.k-alt').forEach(el => {
    el.textContent = el.textContent.replace(/^(Alt|⌥)/, os === 'mac' ? '⌥' : 'Alt');
  });

  localStorage.setItem('cc-cheat-os', os);
}

(function() {
  const saved = localStorage.getItem('cc-cheat-os');
  if (saved) { setOS(saved); return; }
  const isMac = /Mac|iPhone|iPad/.test(navigator.platform || navigator.userAgent);
  setOS(isMac ? 'mac' : 'win');
})();
</script>

<footer class="print:hidden text-center text-gray-400 text-xs py-4">
  Made by <a href="https://github.com/silverhyuk/claude_code_cheat_sheet" target="_blank" class="text-indigo-500 hover:text-indigo-700 font-medium transition-colors">silverhyuk</a>
</footer>

</body>
</html>
